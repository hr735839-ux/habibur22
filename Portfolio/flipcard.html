<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Playing Cards</title>
<style>
    *{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#111;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.title{
color:white;
margin-bottom:30px;
font-size:40px;
}

/* Deck */

.deck{
display:flex;
gap:20px;
}

/* Card */

.card{
width:160px;
height:230px;
perspective:1000px;
}

.card-inner{
width:100%;
height:100%;
position:relative;
transition:0.6s;
transform-style:preserve-3d;
}

.card:hover .card-inner{
transform:rotateY(180deg);
}

/* Front + Back */

.card-front,
.card-back{
position:absolute;
width:100%;
height:100%;
border-radius:12px;
backface-visibility:hidden;
display:flex;
flex-direction:column;
justify-content:space-between;
padding:10px;
box-shadow:0 10px 20px rgba(0,0,0,0.5);
}

.card-front{
background:white;
}

.card-back{
background:linear-gradient(45deg,#141e30,#243b55);
color:white;
align-items:center;
justify-content:center;
font-size:40px;
transform:rotateY(180deg);
}

/* Card content */

.top{
    display: flex;
flex-direction: column;
font-size:20px;
}

.middle{
font-size:60px;
text-align:center;
}

.bottom{
font-size:20px;
transform:rotate(180deg);
align-self:flex-end;
display: flex;
flex-direction: column;
}

/* Colors */

.red{
color:red;
}

.black{
color:black;
}
</style>
</head>

<body>

<h1 class="title">Playing Cards</h1>

<div class="deck">

<div class="card">
<div class="card-inner">

<div class="card-front red">

<div class="top">
<span>A</span>
<span>♥</span>
</div>

<div class="middle">
♥
</div>

<div class="bottom">
    <span>A</span>
    <span>♥</span>
 </div>

</div>

<div class="card-back">
♠
</div>

</div>
</div>

</div>

</body>
</html>
